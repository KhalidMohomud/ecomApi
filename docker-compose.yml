# Local development stack: the app plus a local Postgres container,
# so you can run everything without touching Neon at all. This is
# separate from how the app connects in Steps 1-7 (a real Neon
# instance via DATABASE_URL in .env) — that's still exactly how
# staging/production should work. This file exists so a fresh clone
# of the repo can run `docker compose up` and have a fully working,
# fully local stack with zero cloud dependencies.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecomapi
      POSTGRES_PASSWORD: ecomapi
      POSTGRES_DB: ecomapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Postgres accepts TCP connections slightly before it's actually
    # ready to serve queries. Without this healthcheck (and the
    # depends_on: condition below), the app container could start,
    # try to connect, and fail its very first startup attempt in a
    # race that's invisible in isolated testing and shows up the
    # moment you run `docker compose up` on a fresh volume.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecomapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    # env_file pulls in every KEY=VALUE from .env (JWT_SECRET, token
    # TTLs, etc.) — the same file `go run ./cmd/server` already uses,
    # so nothing is defined twice. The explicit `environment:` block
    # below is layered on top and wins on any key present in both,
    # which is exactly what's needed for DATABASE_URL: .env points at
    # Neon (sslmode=require) for local `go run` development, but
    # inside this Compose network the database is the `db` service
    # above, reachable by its service name as a hostname, over a
    # private Docker network with no TLS needed.
    env_file:
      - .env
    environment:
      APP_ENV: development
      APP_PORT: 8080
      DATABASE_URL: postgresql://ecomapi:ecomapi@db:5432/ecomapi?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
