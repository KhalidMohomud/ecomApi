basePath: /api/v1
definitions:
  github_com_KhalidMohomud_ecomApi_internal_domain_entity.Role:
    enum:
    - customer
    - admin
    - moderator
    type: string
    x-enum-varnames:
    - RoleCustomer
    - RoleAdmin
    - RoleModerator
  github_com_KhalidMohomud_ecomApi_internal_dto.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: |-
          ExpiresIn is seconds until the access token expires, so the
          client knows when to proactively call /auth/refresh instead of
          waiting for a 401.
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.UserResponse'
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.BrandResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      logo_url:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.CategoryResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      parent_id:
        type: string
      slug:
        type: string
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.CreateBrandRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      logo_url:
        maxLength: 500
        type: string
      name:
        maxLength: 150
        minLength: 2
        type: string
      slug:
        maxLength: 170
        type: string
    required:
    - name
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.CreateCategoryRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      name:
        maxLength: 150
        minLength: 2
        type: string
      parent_id:
        type: string
      slug:
        maxLength: 170
        type: string
    required:
    - name
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.CreateProductRequest:
    properties:
      brand_id:
        type: string
      category_id:
        type: string
      description:
        maxLength: 5000
        type: string
      name:
        maxLength: 200
        minLength: 2
        type: string
      price_cents:
        type: integer
      sku:
        maxLength: 64
        minLength: 1
        type: string
      slug:
        maxLength: 220
        type: string
    required:
    - category_id
    - name
    - price_cents
    - sku
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.DashboardResponse:
    properties:
      active_users:
        type: integer
      blocked_users:
        type: integer
      total_users:
        type: integer
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.LoginRequest:
    properties:
      email:
        example: jane@example.com
        type: string
      password:
        example: correct-horse-battery-staple
        type: string
    required:
    - email
    - password
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.PaginatedResponse-github_com_KhalidMohomud_ecomApi_internal_dto_BrandResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.BrandResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.PaginatedResponse-github_com_KhalidMohomud_ecomApi_internal_dto_CategoryResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.CategoryResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.PaginatedResponse-github_com_KhalidMohomud_ecomApi_internal_dto_ProductResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.ProductResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.PaginatedResponse-github_com_KhalidMohomud_ecomApi_internal_dto_UserResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.UserResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.ProductResponse:
    properties:
      brand_id:
        type: string
      category_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      price_cents:
        description: |-
          PriceCents is the authoritative value — exactly what's stored,
          safe to do further arithmetic on. Price is a derived
          convenience for clients that just want to display a number;
          it's computed fresh on every response, never stored or parsed
          from a request.
        type: integer
      sku:
        type: string
      slug:
        type: string
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.RegisterRequest:
    properties:
      email:
        example: jane@example.com
        type: string
      first_name:
        example: Jane
        maxLength: 100
        minLength: 2
        type: string
      last_name:
        example: Doe
        maxLength: 100
        minLength: 2
        type: string
      password:
        example: correct-horse-battery-staple
        minLength: 8
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.UpdateBrandRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      is_active:
        type: boolean
      logo_url:
        maxLength: 500
        type: string
      name:
        maxLength: 150
        minLength: 2
        type: string
      slug:
        maxLength: 170
        type: string
    required:
    - name
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.UpdateCategoryRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 150
        minLength: 2
        type: string
      parent_id:
        type: string
      slug:
        maxLength: 170
        type: string
    required:
    - name
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.UpdateProductRequest:
    properties:
      brand_id:
        type: string
      category_id:
        type: string
      description:
        maxLength: 5000
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 200
        minLength: 2
        type: string
      price_cents:
        type: integer
      sku:
        maxLength: 64
        minLength: 1
        type: string
      slug:
        maxLength: 220
        type: string
    required:
    - category_id
    - name
    - price_cents
    - sku
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.UpdateProfileRequest:
    properties:
      first_name:
        maxLength: 100
        minLength: 2
        type: string
      last_name:
        maxLength: 100
        minLength: 2
        type: string
      phone:
        maxLength: 20
        minLength: 7
        type: string
    required:
    - first_name
    - last_name
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      role:
        $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_domain_entity.Role'
    type: object
  github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse:
    properties:
      errors:
        items:
          type: string
        type: array
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: alizakifarah@gmail.com
    name: API Support
  description: Production-ready E-commerce REST API built with Go, Gin, GORM, and
    PostgreSQL.
  license:
    name: MIT
  title: E-commerce API
  version: "1.0"
paths:
  /admin/dashboard:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.DashboardResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "403":
          description: caller is not an admin
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Admin dashboard summary
      tags:
      - admin
  /admin/users:
    get:
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.PaginatedResponse-github_com_KhalidMohomud_ecomApi_internal_dto_UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - admin
  /admin/users/{id}:
    delete:
      description: Soft-deletes the account and revokes all its refresh tokens.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
        "400":
          description: cannot delete your own account
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - admin
  /admin/users/{id}/block:
    post:
      description: Deactivates the account and revokes all its refresh tokens. An
        access token already issued to that user stays valid until it expires (up
        to 15 minutes) — see the code comment on AdminService.BlockUser for why.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
        "400":
          description: cannot block your own account
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Block a user
      tags:
      - admin
  /admin/users/{id}/unblock:
    post:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Unblock a user
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Exchanges an email/password pair for an access/refresh token pair.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.AuthResponse'
              type: object
        "400":
          description: validation failed
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "401":
          description: invalid credentials
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "403":
          description: account blocked
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Log in
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the given refresh token so it can no longer be used to
        obtain new access tokens. Idempotent — logging out an already-invalid token
        still returns success.
      parameters:
      - description: Logout payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
        "400":
          description: validation failed
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Log out
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a brand new access/refresh
        pair. The refresh token used in the request is revoked immediately (rotation)
        — it cannot be reused.
      parameters:
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.AuthResponse'
              type: object
        "400":
          description: validation failed
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "401":
          description: invalid or expired refresh token
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Refresh an access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a customer account and returns an access/refresh token
        pair. New accounts are always created with the "customer" role.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.AuthResponse'
              type: object
        "400":
          description: validation failed
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "409":
          description: email already registered
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Register a new account
      tags:
      - auth
  /brands:
    get:
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.PaginatedResponse-github_com_KhalidMohomud_ecomApi_internal_dto_BrandResponse'
              type: object
      summary: List brands
      tags:
      - brands
    post:
      consumes:
      - application/json
      description: Admin only. If slug is omitted, it's generated from name.
      parameters:
      - description: Brand payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.CreateBrandRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.BrandResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "409":
          description: slug already in use
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a brand
      tags:
      - brands
  /brands/{id}:
    delete:
      description: Admin only. Soft-deletes the brand.
      parameters:
      - description: Brand ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a brand
      tags:
      - brands
    get:
      parameters:
      - description: Brand ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.BrandResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Get a brand by ID
      tags:
      - brands
    put:
      consumes:
      - application/json
      description: Admin only. Full replace — every field is overwritten with the
        request body.
      parameters:
      - description: Brand ID
        in: path
        name: id
        required: true
        type: string
      - description: Brand payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.UpdateBrandRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.BrandResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a brand
      tags:
      - brands
  /brands/slug/{slug}:
    get:
      parameters:
      - description: Brand slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.BrandResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Get a brand by slug
      tags:
      - brands
  /categories:
    get:
      parameters:
      - default: 1
