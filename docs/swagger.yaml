basePath: /api/v1
definitions:
  github_com_KhalidMohomud_ecomApi_internal_domain_entity.Role:
    enum:
    - customer
    - admin
    - moderator
    type: string
    x-enum-varnames:
    - RoleCustomer
    - RoleAdmin
    - RoleModerator
  github_com_KhalidMohomud_ecomApi_internal_dto.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: |-
          ExpiresIn is seconds until the access token expires, so the
          client knows when to proactively call /auth/refresh instead of
          waiting for a 401.
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.UserResponse'
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.LoginRequest:
    properties:
      email:
        example: jane@example.com
        type: string
      password:
        example: correct-horse-battery-staple
        type: string
    required:
    - email
    - password
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.RegisterRequest:
    properties:
      email:
        example: jane@example.com
        type: string
      first_name:
        example: Jane
        maxLength: 100
        minLength: 2
        type: string
      last_name:
        example: Doe
        maxLength: 100
        minLength: 2
        type: string
      password:
        example: correct-horse-battery-staple
        minLength: 8
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.UpdateProfileRequest:
    properties:
      first_name:
        maxLength: 100
        minLength: 2
        type: string
      last_name:
        maxLength: 100
        minLength: 2
        type: string
      phone:
        maxLength: 20
        minLength: 7
        type: string
    required:
    - first_name
    - last_name
    type: object
  github_com_KhalidMohomud_ecomApi_internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      role:
        $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_domain_entity.Role'
    type: object
  github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse:
    properties:
      errors:
        items:
          type: string
        type: array
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: alizakifarah@gmail.com
    name: API Support
  description: Production-ready E-commerce REST API built with Go, Gin, GORM, and
    PostgreSQL.
  license:
    name: MIT
  title: E-commerce API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Exchanges an email/password pair for an access/refresh token pair.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.AuthResponse'
              type: object
        "400":
          description: validation failed
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "401":
          description: invalid credentials
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "403":
          description: account blocked
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Log in
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the given refresh token so it can no longer be used to
        obtain new access tokens. Idempotent — logging out an already-invalid token
        still returns success.
      parameters:
      - description: Logout payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
        "400":
          description: validation failed
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Log out
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a brand new access/refresh
        pair. The refresh token used in the request is revoked immediately (rotation)
        — it cannot be reused.
      parameters:
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.AuthResponse'
              type: object
        "400":
          description: validation failed
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "401":
          description: invalid or expired refresh token
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Refresh an access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a customer account and returns an access/refresh token
        pair. New accounts are always created with the "customer" role.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.AuthResponse'
              type: object
        "400":
          description: validation failed
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "409":
          description: email already registered
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      summary: Register a new account
      tags:
      - auth
  /users/me:
    delete:
      description: Soft-deletes the account and revokes every session. This cannot
        be undone through the API.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete the current user's account
      tags:
      - users
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get the current user's profile
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates name and phone only — email and role cannot be changed
        through this endpoint.
      parameters:
      - description: Profile fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update the current user's profile
      tags:
      - users
  /users/me/password:
    put:
      consumes:
      - application/json
      description: Requires the current password. On success, every existing session
        (refresh token) is revoked, including the one used to make this request.
      parameters:
      - description: Current and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.SuccessResponse'
        "400":
          description: validation failed or current password incorrect
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_KhalidMohomud_ecomApi_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change the current user's password
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the JWT access token, e.g.
      "Bearer eyJhbGciOi...".
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
